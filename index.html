<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
        }
        
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: #6b7280;
            font-size: 1.1rem;
        }
        
        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #f3f4f6;
            border-radius: 10px;
            color: #374151;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .link-btn:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }
        
        .link-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .link-btn.primary:hover {
            box-shadow: 0 8px 20px -5px rgba(102, 126, 234, 0.5);
        }
        
        /* Sections */
        section {
            margin-bottom: 40px;
        }
        
        section:last-child {
            margin-bottom: 0;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
        }
        
        /* Cards Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        
        .card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -10px rgba(102, 126, 234, 0.3);
        }
        
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .card-info {
            flex: 1;
            min-width: 0;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-type {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 9999px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .card-desc {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.5;
            flex: 1;
        }
        
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
        
        .card-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tech-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            background: #e5e7eb;
            border-radius: 6px;
            color: #374151;
            font-weight: 500;
        }
        
        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
        }
        
        .card-link:hover {
            text-decoration: underline;
        }
        
        /* Type colors */
        .type-juego { background: #fef3c7; color: #92400e; }
        .type-programa { background: #dbeafe; color: #1e40af; }
        .type-proyecto { background: #fce7f3; color: #9d174d; }
        .type-otro { background: #e5e7eb; color: #374151; }
        
        .icon-juego { background: #fef3c7; }
        .icon-programa { background: #dbeafe; }
        .icon-proyecto { background: #fce7f3; }
        .icon-otro { background: #e5e7eb; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }
        
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -5px rgba(102, 126, 234, 0.5);
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 0.875rem;
        }
    </style>
</head>

    <script>
        // Año actual
        document.getElementById('anio').textContent = new Date().getFullYear();
        
        // Datos guardados en localStorage
        const STORAGE_KEY = 'mi-portafolio-data';
        
        function cargarDatos() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {
                nombre: 'Mi Portafolio',
                tagline: 'Proyectos, juegos y programas que he creado',
                avatar: '👤',
                links: { github: '#', youtube: '#', discord: '#' },
                juegos: [],
                programas: [],
                proyectos: []
            };
        }
        
        function guardarDatos(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function render() {
            const data = cargarDatos();
            
            // Header
            document.getElementById('nombre').textContent = data.nombre;
            document.getElementById('tagline').textContent = data.tagline;
            document.getElementById('avatar').textContent = data.avatar;
            document.getElementById('link-github').href = data.links.github || '#';
            document.getElementById('link-youtube').href = data.links.youtube || '#';
            document.getElementById('link-discord').href = data.links.discord || '#';
            
            // Render grids
            renderGrid('juegos', data.juegos, 'icon-juego', 'type-juego');
            renderGrid('programas', data.programas, 'icon-programa', 'type-programa');
            renderGrid('proyectos', data.proyectos, 'icon-proyecto', 'type-proyecto');
        }
        
        function renderGrid(tipo, items, iconClass, typeClass) {
            const grid = document.getElementById(`grid-${tipo}`);
            if (!items.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            ${tipo === 'juegos' ? '<path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>' : 
                             tipo === 'programas' ? '<path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>' : 
                             '<path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>'}
                        </svg>
                        <p>No hay ${tipo} aún</p>
                        <button class="btn-add" onclick="agregarItem('${tipo}')">+ Agregar ${tipo.slice(0, -1)}</button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = items.map(item => `
                <a href="${item.url || '#'}" class="card" ${item.url ? 'target="_blank" rel="noopener"' : ''}>
                    <div class="card-header">
                        <div class="card-icon ${iconClass}">${item.icono || '📦'}</div>
                        <div class="card-info">
                            <div class="card-title">${item.titulo}</div>
                            <span class="card-type ${typeClass}">${item.tipo || tipo.slice(0, -1)}</span>
                        </div>
                    </div>
                    <p class="card-desc">${item.descripcion || 'Sin descripción'}</p>
                    <div class="card-footer">
                        <div class="card-tech">
                            ${(item.tecnologias || []).map(t => `<span class="tech-tag">${t}</span>`).join('')}
                        </div>
                        ${item.url ? `<span class="card-link">Ver proyecto →</span>` : ''}
                    </div>
                </a>
            `).join('');
        }
        
        // Agregar item - abre prompt simple
        function agregarItem(tipo) {
            const data = cargarDatos();
            const titulo = prompt(`Título del ${tipo.slice(0, -1)}:`);
            if (!titulo) return;
            
            const descripcion = prompt(`Descripción breve:`) || '';
            const url = prompt(`Link (GitHub, itch.io, web, etc.):`) || '';
            const icono = prompt(`Emoji/icono (ej: 🎮, 💻, 🚀):`) || (tipo === 'juegos' ? '🎮' : tipo === 'programas' ? '💻' : '🚀');
            const techs = prompt(`Tecnologías (separadas por coma, ej: Python, Pygame):`) || '';
            
            const nuevo = {
                titulo,
                descripcion,
                url,
                icono,
                tipo: tipo.slice(0, -1),
                tecnologias: techs.split(',').map(t => t.trim()).filter(t => t)
            };
            
            data[tipo].push(nuevo);
            guardarDatos(data);
            render();
        }
        
        // Editar info del header
        document.getElementById('nombre').addEventListener('click', () => {
            const data = cargarDatos();
            const nuevo = prompt('Tu nombre:', data.nombre);
            if (nuevo) { data.nombre = nuevo; guardarDatos(data); render(); }
        });
        
        document.getElementById('tagline').addEventListener('click', () => {
            const data = cargarDatos();
            const nuevo = prompt('Tu tagline:', data.tagline);
            if (nuevo) { data.tagline = nuevo; guardarDatos(data); render(); }
        });
        
        document.getElementById('avatar').addEventListener('click', () => {
            const data = cargarDatos();
            const nuevo = prompt('Emoji avatar:', data.avatar);
            if (nuevo) { data.avatar = nuevo; guardarDatos(data); render(); }
        });
        
        // Click en links para editarlos
        ['github', 'youtube', 'discord'].forEach(key => {
            document.getElementById(`link-${key}`).addEventListener('click', (e) => {
                e.preventDefault();
                const data = cargarDatos();
                const nuevo = prompt(`${key.charAt(0).toUpperCase() + key.slice(1)} URL:`, data.links[key]);
                if (nuevo) { data.links[key] = nuevo; guardarDatos(data); render(); }
            });
        });
        
        // Inicializar
        render();
        
        // Atajo: Ctrl+Click en card para editar
        document.addEventListener('click', (e) => {
            if (e.ctrlKey && e.target.closest('.card')) {
                e.preventDefault();
                alert('Para editar, borra el item en localStorage y vuelve a agregarlo.\nPróxima versión: editar inline.');
            }
        });
    </script>
</body>
</html>
